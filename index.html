<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReelDiff — Turn GitHub PRs into Videos</title>
    <script>
      (function() {
        const saved = localStorage.getItem('reeldiff-theme');
        const theme = saved === 'light' || saved === 'dark'
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
    <meta name="description" content="Transform any GitHub pull request into a shareable short-form video. Powered by AI." />
    <meta name="theme-color" content="#FDFBF7" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Open Graph -->
    <meta property="og:title" content="ReelDiff — Turn GitHub PRs into Videos" />
    <meta property="og:description" content="Transform any GitHub pull request into a shareable short-form video. Powered by AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://patchplay.vercel.app" />
    <meta property="og:image" content="https://patchplay.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PatchPlay - Transform GitHub PRs into shareable videos" />
    <meta property="og:site_name" content="ReelDiff" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReelDiff — Turn GitHub PRs into Videos" />
    <meta name="twitter:description" content="Transform any GitHub pull request into a shareable short-form video. Powered by AI." />
    <meta name="twitter:image" content="https://patchplay.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="PatchPlay - Transform GitHub PRs into shareable videos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
